# Pipeline config: drives run_pipeline.py.
# Runtime CLI args take precedence over yaml for the following fields:
#   --dataset  -> syco.dataset (must be a key in syco.datasets below)
#   --model    -> models[*].model_id (must already exist in this list)
#   --method   -> methods[*].method  (must already exist in this list)
#   --bits     -> weight quant width (N for WN); required; single bit width per run
#   --eval     -> syco.eval_mechanistic / eval_authority_advanced / eval_behavior_prefix
#   --gpu      -> cuda_device (cuda:N / N / N,M; mapped to CUDA_VISIBLE_DEVICES)

# Path roots (relative to this file or absolute):
#   - cache_root: HF cache + quantized model dirs.
#   - save_root:  syco pkl outputs (behavioral / mechanistic).
#   - result_root: figure outputs.
cache_root: ../cache
save_root: ../save
result_root: ../result

# Auto-download calib/eval data; when false, point to existing local data dirs
calib_auto_download: true
eval_auto_download: true
calib_root: ..
eval_root: ..

# Repo locations
llmc_dir: ../quantization/LightCompress
syco_repo_dir: ../evaluation/LLM-sycophancy

# Model pool: CLI --model must match one model_id
models:
  - model_id: llama_3.1_8b_instruct
    path: meta-llama/Llama-3.1-8B-Instruct
    type: Llama
  - model_id: qwen2.5_7b_instruct
    path: Qwen/Qwen2.5-7B-Instruct
    type: Qwen2
  - model_id: qwen3_4b_instruct_2507
    path: Qwen/Qwen3-4B-Instruct-2507
    type: Qwen3
  - model_id: qwen3_8b
    path: Qwen/Qwen3-8B
    type: Qwen3
  - model_id: deepseek_llm_7b_chat
    path: deepseek-ai/deepseek-llm-7b-chat
    type: Llama
  - model_id: mistral_7b_instruct_v0_3
    path: mistralai/Mistral-7B-Instruct-v0.3
    type: Mistral
  - model_id: gemma-2-9b-it
    path: google/gemma-2-9b-it
    type: Gemma2

# Method pool: CLI --method must match one method name.
# Bit width from CLI --bits; if yaml sets method_id (must end with _wN), N must match --bits.
methods:
  - method: GPTQ
  - method: Awq
  - method: RTN
  - method: NormTweaking
  - method: LlmInt8
  - method: SpQR
  - method: OmniQuant
  - method: SmoothQuant
  - method: QUIK
  - method: QuaRot
  - method: DGQ
  - method: TesseraQ
  - method: AdaDim
  - method: OsPlus
  - method: HQQ

# LightCompress torchrun
nproc_per_node: 1

# Sycophancy eval fields (not overridden by CLI).
# syco.datasets is per-dataset; selected entry merged onto syco top-level.
syco:
  datasets:
    mmlu:
      data_slug: mmlu
      raw_file: raw_data/mmlu_raw.pkl
      download_script: download_mmlu.py
      build_lib_extra_args: []
    commonsenseqa:
      data_slug: commonsenseqa
      raw_file: experiments/data_generation/raw_data/commonsenseqa_raw.pkl
      download_script: download_commonsenseqa.py
      build_lib_extra_args: ["--output_name_prefix", "academic_prefix_commonsenseqa"]

  question_type: opinion_only
  prefix_type: ""
  prefix_subtype: original
  academic_level: ""
  full_question_column: full_question
  max_retries: 1
  answer_max_new_tokens: 0  # generate N tokens before extracting option letter; 0=argmax+decode only
  # Hugging Face Hub token (gated models, etc.). null: do not set in subprocess env; export HF_TOKEN / HUGGING_FACE_HUB_TOKEN.
  huggingface_token: null
  # debug_inference: true   # optional; or env RUN_SYCO_DEBUG=1
  # Default: run_pipeline ignores this when eval runs; uses CLI --data_seed_rng + --eval_avg_runs for N seeds.
  # Only --skip_eval reads this. plot-only without --plot_scan_seeds uses the same two CLI args for averaging seeds.
  data_seed: [42]
  # Behavioral figs default to full SR. For correct-only SR, set true in yaml or CLI --eval ...,correct_only
  # full_sr via CLI forces full SR only when yaml had eval_sr_correct_only true (mutually exclusive with correct_only)
  eval_sr_correct_only: false
  behavior_input_filename: null
  # run_syco_logit_cot: save per-layer option-token HS (main pkl omits HS when stream_hs_dir is set)
  save_option_hs: false
  # stream_hs_dir: "output_hs_stream/commonsenseqa"

# Optional: aggregate each opinion_only run compute_accuracy result to CSV
aggregate_accuracy_csv: null

# Optional: plot after eval (run_plot_phase)
plot_figures: true
# figure_output_dir: null   # override default result_root; default result_root/behavioral/{dataset}/
